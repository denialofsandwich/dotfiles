shell zsh

enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell no

tab_bar_style powerline
tab_bar_edge top
tab_powerline_style slanted
tab_title_template "{tab.active_oldest_exe}: {tab.active_oldest_wd}"

# BEGIN_KITTY_THEME
# Tokyo Night Moon
include current-theme.conf
# END_KITTY_THEME
background_opacity 0.8
background_blur 64

# BEGIN_KITTY_FONTS
font_family      family="Hack Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
font_size 9.0

# neovim fixes
map ctrl+shift+minus send_text all \x1f
map ctrl+shift+7 send_text all \x1f
map ctrl+shift+kp_subtract change_font_size all -2.0
