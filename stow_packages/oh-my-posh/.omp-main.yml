$schema: >-
  https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json
blocks:
  - type: prompt
    alignment: left
    segments:
      - type: os
        background: "235"
        foreground: "12"
        style: diamond
        leading_diamond: ¯éÂ
        trailing_diamond: ¯é░
        template: "{{ if .WSL }}WSL at {{ end }}{{ .Icon }} "
      - type: root
        background: "235"
        foreground: "13"
        style: diamond
        leading_diamond: ¯âù
        trailing_diamond: ¯é░
        template: " ´âº "
      - type: session
        background: "235"
        foreground: "14"
        style: diamond
        leading_diamond: ¯âù
        trailing_diamond: ¯é░
        template: '{{ if eq .Env.OMP_SHOW_SESSION "1" }}{{ if .Root }}<b>{{ end }} {{ .UserName }}{{ if .Root }}</b>{{ end }}@{{ .HostName }} {{ end }}'
      - type: shell
        background: "235"
        foreground: "13"
        style: diamond
        leading_diamond: ¯âù
        trailing_diamond: ¯é░
        template: '{{ if ne .Name "zsh" }} {{ .Name }} {{ end }}'
        properties:
          mapped_shell_names:
            pwsh: ps
      - type: git
        properties:
          fetch_status: true
          fetch_upstream_icon: true
        background: "235"
        foreground: "11"
        style: diamond
        leading_diamond: ¯âù
        trailing_diamond: ¯é░
        template: >-
          <> {{ .UpstreamIcon }}  {{ .HEAD }}{{
          if or .Ahead .Behind }} {{ end }}{{
          if .Ahead }}Ôåæ{{ .Ahead }}{{ end }}{{
          if .Behind }}Ôåô{{ .Behind }}{{ end }}{{
          if .Staging.Changed }}<2> ´üå {{ .Staging.String }}</>{{ end }}{{
          if .Working.Changed }}<16> ´üä {{ .Working.String }}</>{{ end }}{{
          if gt .StashCount 0 }}<4> ¯¡ï {{ .StashCount }}</>{{ end }} <>
      - type: python
        background: "235"
        foreground: "10"
        style: diamond
        leading_diamond: ¯âù
        trailing_diamond: ¯é░
        template: " ¯êÁ {{ .Venv }} "
      - type: text
        background: "235"
        foreground: "17"
        style: diamond
        leading_diamond: ¯âù
        trailing_diamond: ¯é░
        template: " {{ if .Env.OMP_CUSTOM1 }}{{ .Env.OMP_CUSTOM1 }}{{ end }} "
      - type: text
        background: "235"
        foreground: "14"
        style: diamond
        leading_diamond: ¯âù
        trailing_diamond: ¯é░
        template: " {{ if .Env.OMP_CUSTOM2 }}{{ .Env.OMP_CUSTOM2 }}{{ end }} "
  - type: prompt
    alignment: right
    segments:
      - type: status
        background: "235"
        foreground: "13"
        style: diamond
        leading_diamond: ¯é▓
        trailing_diamond: ¯âû
        properties:
          status_template: "{{ reason .Code }}"
      - type: executiontime
        background: "235"
        foreground: "3"
        style: diamond
        leading_diamond: ¯é▓
        trailing_diamond: ¯âû
        properties:
          threshold: 500
          style: round
        template: " {{ .FormattedMs }} ´ôú "
      - type: time
        background: "235"
        foreground: "4"
        style: diamond
        leading_diamond: ¯é▓
        trailing_diamond: ¯é┤
        properties:
          time_format: "15:04:05"
        template: " {{ .CurrentDate | date .Format }} ´Çù "
  - type: prompt
    alignment: left
    newline: true
    segments:
      - type: path
        background: "235"
        foreground: "12"
        style: diamond
        leading_diamond: ¯éÂ
        trailing_diamond: ¯é░
        properties:
          home_icon: "<4><b>~</b></>"
          right_format: "<4><b>%s</b></>"
          style: full
        template: " {{ .Path }} "
  - type: prompt
    alignment: left
    newline: true
    segments:
      - type: status
        foreground: "10"
        foreground_templates:
          - "{{ if gt .Code 0 }}9{{ end }}"
        style: plain
        properties:
          always_enabled: true
        template: "ÔØ» "
version: 3
